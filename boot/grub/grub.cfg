# boot/grub/grub.cfg
# GRUB 引导配置 - k_K chat linuxAI
#
# 启动流程: GRUB -> Linux 内核 (EFI stub) -> initramfs.cpio.xz -> /init -> k_K 主程序
set timeout=3
set default=0

# console 字体 (含 CJK)
if loadfont /boot/grub/unifont.pf2 ; then
    set gfxterm=auto
    terminal_output gfxterm
    set locale_dir=$prefix/locale
    set lang=zh_CN
    insmod all_video
fi

menuentry "k_K chat linuxAI v0.1.1" --class linux {
    linux   /boot/vmlinuz quiet loglevel=3 console=tty0 console=ttyS0,115200n8
    initrd  /boot/initramfs.cpio.xz
}

menuentry "k_K chat linuxAI v0.1.1 (debug mode)" --class linux {
    linux   /boot/vmlinuz ignore_loglevel debug loglevel=7 console=tty0 console=ttyS0,115200n8
    initrd  /boot/initramfs.cpio.xz
}

menuentry "Reboot" {
    reboot
}

menuentry "Shutdown" {
    halt
}
